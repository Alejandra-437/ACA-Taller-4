site_name: Manual de Git y GitHub
site_description: Documentación técnica sobre control de versiones con Git y trabajo colaborativo en GitHub.
site_author: Alejandra Vanessa Serrano Córdova
site_url: https://alejandra-437.github.io/ACA-Taller-4/

# Estructura de navegación
nav:
  - Inicio: index.md
  - Guía Básica:
      - Introducción a Git: guia/introduccion.md
      - Comandos esenciales: guia/comandos.md
      - Flujo de trabajo: guia/flujo.md
  - Temas Avanzados:
      - Ramas y merges: avanzado/ramas.md
      - Trabajo colaborativo: avanzado/colaboracion.md
  - Acerca de: about.md

# Configuración del tema Material
theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search:
      lang: es
  - git-revision-date-localized:
      fallback_to_build_date: true
      locale: es
      type: date

# Extensiones de Markdown
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: "#"
      toc_depth: 3

# Información extra (footer, redes sociales)
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/
      name: Twitter
  generator: false

